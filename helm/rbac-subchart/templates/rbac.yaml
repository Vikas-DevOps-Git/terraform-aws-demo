apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.appName }}-sa
  namespace: {{ .Values.namespace | default "default" }}
  annotations:
    eks.amazonaws.com/role-arn: {{ .Values.iamRoleArn | default "" }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.appName }}-role
  namespace: {{ .Values.namespace | default "default" }}
rules:
{{ toYaml .Values.rbac.rules | indent 2 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ .Values.appName }}-rolebinding
  namespace: {{ .Values.namespace | default "default" }}
subjects:
- kind: ServiceAccount
  name: {{ .Values.appName }}-sa
  namespace: {{ .Values.namespace | default "default" }}
roleRef:
  kind: Role
  name: {{ .Values.appName }}-role
  apiGroup: rbac.authorization.k8s.io
