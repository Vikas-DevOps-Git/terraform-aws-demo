appName: payment-api
namespace: finance
team: payments
env: production
replicas: 3
containerPort: 8080
metricsPort: "8080"
image:
  repository: 123456789.dkr.ecr.us-east-1.amazonaws.com/payment-api
  tag: "1.3.0"
resources:
  requests: { cpu: "200m", memory: "256Mi" }
  limits:   { cpu: "1000m", memory: "1Gi" }
hpa:
  minReplicas: 3
  maxReplicas: 20
  targetCPU: 70
  targetMemory: 80
rbac:
  rules:
    - apiGroups: [""]
      resources: ["secrets", "configmaps"]
      verbs: ["get", "list"]
